    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --mineral-blue: #1c2b39; /* 峰礦藍背景 */
            --card-bg: #26384a;      /* 卡片底色 */
            --gold-accent: #d4af37;  /* 登頂金 */
            --text-main: #e2e8f0;    /* 主文字色 */
            --text-muted: #94a3b8;   /* 次要文字色 */
            --border-color: #3b5064; /* 邊框色 */
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--mineral-blue); color: var(--text-main); margin: 0; padding: 20px; }
        h1 { text-align: center; color: var(--gold-accent); letter-spacing: 2px; font-weight: 300; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: var(--text-muted); margin-top: 0; margin-bottom: 30px; letter-spacing: 1px; }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* 地圖區塊設定 */
        #map { height: 450px; width: 100%; border-radius: 12px; border: 4px solid var(--border-color); margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 1; }
        
        .progress-container { width: 100%; background-color: var(--border-color); border-radius: 20px; overflow: hidden; margin-bottom: 30px; }
        .progress-bar { height: 24px; background-color: var(--gold-accent); width: 0%; text-align: center; line-height: 24px; color: #000; font-weight: bold; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border-left: 6px solid var(--text-muted); transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .card.climbed { border-left-color: var(--gold-accent); transform: translateY(-3px); box-shadow: 0 8px 15px rgba(212, 175, 55, 0.15); }
        
        .card h3 { margin: 0 0 8px 0; color: #fff; font-size: 1.2rem; }
        .card p { margin: 0 0 15px 0; font-size: 14px; color: var(--text-muted); }
        
        input[type="date"], input[type="text"] { width: 100%; margin-top: 10px; padding: 10px; box-sizing: border-box; border: 1px solid var(--border-color); border-radius: 6px; background-color: #141f2a; color: white; font-family: inherit; }
        input[type="date"]:disabled, input[type="text"]:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .checkbox-wrapper { display: flex; align-items: center; margin-bottom: 10px; cursor: pointer; }
        .checkbox-wrapper input { margin-right: 10px; transform: scale(1.3); cursor: pointer; accent-color: var(--gold-accent); }
        .checkbox-wrapper label { cursor: pointer; font-weight: 500; color: var(--text-main); }
    </style>
</head>

        let peaksData = JSON.parse(localStorage.getItem('myBaiyueMapData')) || initialPeaks;
        let map;
        let markers = []; 

        // 初始化地圖
        function initMap() {
            // 中心點設定在台灣中心 (埔里附近)，縮放等級 7 剛好可看見全台
            map = L.map('map').setView([23.7, 121.0], 7);

            // 深色質感底圖 (類似峰礦藍)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);
        }

        // 渲染地圖標記
        function renderMarkers() {
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];

            peaksData.forEach((peak) => {
                const markerColor = peak.climbed ? '#d4af37' : '#475569';
                const fillOpacity = peak.climbed ? 0.9 : 0.4;
                const radius = peak.climbed ? 8 : 4; 

                const marker = L.circleMarker([peak.lat, peak.lng], {
                    radius: radius,
                    color: markerColor,
                    fillColor: markerColor,
                    fillOpacity: fillOpacity,
                    weight: 2
                }).addTo(map);

                marker.bindPopup(`<b>${peak.name}</b><br>海拔: ${peak.height}m<br>狀態: ${peak.climbed ? '已登頂 🏆' : '尚未挑戰'}`);
                markers.push(marker);
            });
        }

        // 渲染卡片列表
        function renderPeaks() {
            const grid = document.getElementById('peaks-grid');
            grid.innerHTML = '';
            let climbedCount = 0;

            peaksData.forEach((peak, index) => {
                if (peak.climbed) climbedCount++;

                const card = document.createElement('div');
                card.className = `card ${peak.climbed ? 'climbed' : ''}`;
                
                card.innerHTML = `
                    <h3>#${peak.id} ${peak.name}</h3>
                    <p>海拔: ${peak.height} 公尺</p>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="check-${index}" ${peak.climbed ? 'checked' : ''} onchange="toggleClimbed(${index})">
                        <label for="check-${index}">已插旗！</label>
                    </div>
                    <input type="date" value="${peak.date || ''}" onchange="updateData(${index}, 'date', this.value)" ${peak.climbed ? '' : 'disabled'}>
                    <input type="text" placeholder="寫下回憶 (如: 天氣、隊友)" value="${peak.note || ''}" onchange="updateData(${index}, 'note', this.value)" ${peak.climbed ? '' : 'disabled'}>
                `;
                grid.appendChild(card);
            });

            updateProgress(climbedCount);
        }

        function toggleClimbed(index) {
            peaksData[index].climbed = !peaksData[index].climbed;
            if (!peaksData[index].climbed) {
                peaksData[index].date = '';
                peaksData[index].note = '';
            }
            saveData();
            renderPeaks();
            renderMarkers(); 
        }

        function updateData(index, field, value) {
            peaksData[index][field] = value;
            saveData();
        }

        function saveData() {
            localStorage.setItem('myBaiyueMapData', JSON.stringify(peaksData));
        }

        function updateProgress(climbedCount) {
            const total = peaksData.length; 
            const percentage = total === 0 ? 0 : Math.round((climbedCount / total) * 100);
            const progressBar = document.getElementById('progress-bar');
            progressBar.style.width = percentage + '%';
            progressBar.innerText = `完成度: ${climbedCount} / ${total} 座 (${percentage}%)`;
        }

        // 啟動程式
        initMap();
        renderMarkers();
        renderPeaks();
    </script>
